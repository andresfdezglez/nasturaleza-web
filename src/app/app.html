@if (isIntroVisible()) {
 <div class="intro-overlay" [class.fade-out]="fadeOutStarted()">
    <div class="logo-circle-container">
      
      <picture>
        <source srcset="assets/images/logo_grande.webp" media="(max-width: 767px)">
        
        <img src="assets/images/logo_grande.png" 
             alt="Logo N'asturaleza" 
             class="logo-img-intro">
      </picture>

    </div>
  </div>
}
<mat-sidenav-container class="sidenav-container">

  <!-- Sidenav móvil -->
  <mat-sidenav #drawer class="sidenav" mode="over">
    <mat-nav-list>
      <a mat-list-item href="" (click)="drawer.close()">Inicio</a>
      <a mat-list-item href="activities" (click)="drawer.close()">Actividades</a>
      <a mat-list-item href="reviews" (click)="drawer.close()">Reseñas</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Contenido principal -->
  <mat-sidenav-content class="sidenav-content">

    <!-- Fondo fijo -->
    <div class="app-background" 
       [class.es-seccion-verde]="config().isGreen"
       [style.background-image]="config().isGreen ? 'none' : 'url(' + config().image + ')'">
  </div>

    <!-- Toolbar fija -->
    <mat-toolbar color="primary" class="toolbar">

      <!-- Botón hamburguesa solo móvil -->
      <button mat-icon-button (click)="drawer.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="toolbar-logo-container">
        <img ngSrc="assets/images/logo_grande.webp" width="126" 
     height="126"
     priority 
     alt="Logo N'asturaleza" 
     disableOptimizedImageSizeCheck
     class="toolbar-logo-img">
      </div>

      <span class="logo">N'asturaleza</span>

      <!-- Links visibles en tablet/escritorio -->
      <nav class="nav-links">
        <a mat-button href="">Inicio</a>
        <a mat-button href="activities">Actividades</a>
        <a mat-button href="reviews">Reseñas</a>
      </nav>

      <span class="spacer"></span>

    </mat-toolbar>

    <!-- Contenido scrolleable -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
