@if (isIntroVisible()) {
<div class="intro-overlay" [class.fade-out]="fadeOutStarted()">
  <div class="logo-circle-container">

    <picture>
      <source srcset="assets/images/logo_grande.webp" media="(max-width: 767px)">

      <img src="assets/images/logo_grande.png" alt="Logo N'asturaleza" class="logo-img-intro">
    </picture>

  </div>
</div>
}
<mat-sidenav-container class="sidenav-container">

  <!-- Sidenav móvil -->
  <mat-sidenav #drawer class="sidenav" mode="over">
    <mat-nav-list>
      <a mat-list-item href="" (click)="drawer.close()">Inicio</a>
      <a mat-list-item href="activities" (click)="drawer.close()">Actividades</a>
      <a mat-list-item href="reviews" (click)="drawer.close()">Reseñas</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Contenido principal -->
  <mat-sidenav-content class="sidenav-content">
    <!-- Toolbar fija -->
    <mat-toolbar color="primary" class="toolbar">

      <!-- Botón hamburguesa solo móvil -->
      <button mat-icon-button (click)="drawer.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="toolbar-logo-container">
        <a href="">
          <img ngSrc="assets/images/logo_grande.webp" width="110" height="80" priority alt="Logo N'asturaleza"
            disableOptimizedImageSizeCheck class="toolbar-logo-img"/>
        </a>
      </div>
      <a class="logo" href="">
        <span >N'ASTURALEZA</span>
      </a>
      <!-- Links visibles en tablet/escritorio -->
      <nav class="nav-links">
        <a mat-button href="">Inicio</a>
        <a mat-button href="activities">Actividades</a>
      </nav>

      <span class="spacer"></span>

    </mat-toolbar>

    <!-- Contenido scrolleable -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
