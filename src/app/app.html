<mat-sidenav-container class="sidenav-container">

  <!-- Sidenav móvil -->
  <mat-sidenav #drawer class="sidenav" mode="over">
    <mat-nav-list>
      <a mat-list-item href="" (click)="drawer.close()">Inicio</a>
      <a mat-list-item href="events" (click)="drawer.close()">Eventos</a>
      <a mat-list-item href="activities" (click)="drawer.close()">Actividades</a>
      <a mat-list-item href="contact" (click)="drawer.close()">Contacto</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Contenido principal -->
  <mat-sidenav-content class="sidenav-content">

    <!-- Fondo fijo -->
    <div class="app-background"></div>

    <!-- Toolbar fija -->
    <mat-toolbar color="primary" class="toolbar">

      <!-- Botón hamburguesa solo móvil -->
      <button mat-icon-button (click)="drawer.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="logo">Nasturaleza</span>

      <span class="spacer"></span>

      <!-- Links visibles en tablet/escritorio -->
      <nav class="nav-links">
        <a mat-button href="">Inicio</a>
        <a mat-button href="events">Eventos</a>
        <a mat-button href="activities">Actividades</a>
        <a mat-button href="contact">Contacto</a>
      </nav>

    </mat-toolbar>

    <!-- Contenido scrolleable -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
