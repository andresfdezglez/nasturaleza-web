<section class="header-content">
  <div class="header-image-container">
     @if (isVideo()) {
      <video playsinline autoplay loop muted class="main-featured-img"  [src]="srcVideo()"></video>
      
    }@else{
      <img [src]="srcVideo()" class="main-featured-img">
    }
    
  </div>
  <div class="video-overlay-content">
    <header class="title">
    @if (isVisible()) {
      <h1 [class]="claseAnimacion()">
        {{ title() }}
      </h1>
    }
  </header>
  </div>
</section>
