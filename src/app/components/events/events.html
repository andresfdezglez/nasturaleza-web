<div class="page-container">
  <h1 class="page-title">Actividades de Montaña</h1>
<div class="cards-container">

  <mat-card class="item-card" appearance="outlined" *ngFor="let item of items">
  <img mat-card-image src="/images/fondo.jpg" alt="Photo of a Shiba Inu">
    <mat-card-header>
    <mat-card-title>{{item.title}}</mat-card-title>
    <mat-card-subtitle>Actividad 1</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>
      Disfruta de una emocionante jornada de senderismo por paisajes naturales impresionantes, 
      rodeado de aire puro 
      y vistas panorámicas que te dejarán sin aliento.
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>Más Info</button>
    <button matButton>Reservar</button>
  </mat-card-actions>
</mat-card>

</div>
</div>
