<div class="container">
  <!-- Botón para abrir el calendario -->
  <button *ngIf="!isCalendarOpen" mat-button class="calendar-button" (click)="toggleCalendar()">Abrir Calendario</button>

  <!-- Calendario desplegable -->
  <mat-card *ngIf="isCalendarOpen" class="calendar-card">
    <mat-calendar [(selected)]="selected" (selectedChange)="onDateSelected($event)"></mat-calendar>
  </mat-card>

  <!-- Panel de eventos -->
  <mat-card class="events-panel">
    <img mat-card-image src="/assets/images/fondo.jpg" alt="Evento">
    <mat-card-header>
      <mat-card-title>Evento</mat-card-title>
      <mat-card-subtitle>{{ selected() }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>
        Disfruta de una emocionante jornada de senderismo por paisajes naturales impresionantes, 
        rodeado de aire puro y vistas panorámicas que te dejarán sin aliento.
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button>Más Info</button>
      <button mat-button>Reservar</button>
    </mat-card-actions>
  </mat-card>
</div>
